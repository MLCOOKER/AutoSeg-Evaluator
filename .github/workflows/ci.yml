name: CI

# Lints and tests on every push / pull request to main. Runs on Windows
# (the primary deployment target) plus a Linux job for a sanity cross-check.
# Headless Qt: pytest-qt + the ``offscreen`` Qt platform plugin so GUI
# widget tests don't require a real display server.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: python -m pip install --upgrade pip ruff
      - name: ruff check
        run: ruff check src tests scripts
      - name: ruff format --check
        run: ruff format --check src tests scripts

  test:
    name: Tests (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python: ["3.11"]
    env:
      # Run Qt widgets headless so pytest-qt can spin up a QApplication
      # without an X server / desktop session.
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install Linux Qt platform libs
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-sync1 libxcb-xfixes0 \
            libxcb-xinerama0 libxkbcommon-x11-0 libxcb-xkb1

      - name: Install project (editable, with dev extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install PlatiPy (for equivalence test only)
        # PlatiPy backs tests/test_platipy_equivalence.py — a regression
        # test that pins AutoSeg's mask rasteriser as voxel-identical to
        # PlatiPy's transform_point_set_from_dicom_struct. Kept out of
        # the main [dev] extras to avoid forcing every contributor into
        # PlatiPy's transitive deps (vtk, etc.); the test pytest.importorskip's
        # itself when PlatiPy is absent so a missing-on-purpose local run
        # still passes.
        run: python -m pip install "platipy>=0.7"

      - name: Run pytest
        run: python -m pytest -q
